[build]
  publish   = "public"
  command   = "PHONE=$(echo \"$OWNER_PHONE_NUMBER\" | sed 's/+//g') && sed -i \"s/__OWNER_PHONE__/$PHONE/g\" public/index.html"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers de sécurité sur toutes les pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "no-referrer"
    Permissions-Policy     = "geolocation=(self), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api-adresse.data.gouv.fr;"
